<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaChain - Hospital Management</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="hospital.css">
</head>
<body>
    <!-- Notification Container -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- Main Hospital Page -->
    <div class="container-fluid py-4" id="hospitalPage">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"><i class="fas fa-hospital me-2"></i>Hospital Management</h2>
            <button class="btn btn-primary" id="addHospitalBtn" data-bs-toggle="modal" data-bs-target="#addHospitalModal">
                <i class="fas fa-plus me-2"></i>Add New Hospital
            </button>
        </div>
        
        <!-- Hospital Statistics -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card dashboard-card border-primary">
                    <div class="card-body text-center">
                        <h3 class="text-primary" id="totalHospitals">0</h3>
                        <p class="card-text">Total Hospitals</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card dashboard-card border-success">
                    <div class="card-body text-center">
                        <h3 class="text-success" id="activeHospitals">0</h3>
                        <p class="card-text">Active Hospitals</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card dashboard-card border-info">
                    <div class="card-body text-center">
                        <h3 class="text-info" id="totalBeds">0</h3>
                        <p class="card-text">Total Bed Capacity</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card dashboard-card border-warning">
                    <div class="card-body text-center">
                        <h3 class="text-warning" id="totalDoctorsInHospitals">0</h3>
                        <p class="card-text">Associated Doctors</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Hospitals Grid -->
        <div class="row" id="hospitalsGrid">
            <!-- Hospitals will be loaded here -->
        </div>
        
        <!-- Hospitals Table -->
        <div class="card mt-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Hospital Directory</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Hospital Name</th>
                                <th>Type</th>
                                <th>Location</th>
                                <th>Contact</th>
                                <th>Capacity</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="hospitalsTableBody">
                            <!-- Hospital rows will be added here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Hospital Modal -->
    <div class="modal fade" id="addHospitalModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="hospitalModalTitle">Add New Hospital</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addHospitalForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="hospitalName" class="form-label">Hospital Name</label>
                                <input type="text" class="form-control" id="hospitalName" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="hospitalType" class="form-label">Hospital Type</label>
                                <select class="form-select" id="hospitalType" required>
                                    <option value="">Select Type</option>
                                    <option value="general">General Hospital</option>
                                    <option value="specialty">Specialty Hospital</option>
                                    <option value="teaching">Teaching Hospital</option>
                                    <option value="clinic">Clinic</option>
                                    <option value="research">Research Center</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="hospitalEmail" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="hospitalEmail" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="hospitalPhone" class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" id="hospitalPhone" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="hospitalAddress" class="form-label">Address</label>
                            <textarea class="form-control" id="hospitalAddress" rows="2" required></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="hospitalCity" class="form-label">City</label>
                                <input type="text" class="form-control" id="hospitalCity" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="hospitalState" class="form-label">State</label>
                                <input type="text" class="form-control" id="hospitalState" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="hospitalZip" class="form-label">ZIP Code</label>
                                <input type="text" class="form-control" id="hospitalZip" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="hospitalLicense" class="form-label">License Number</label>
                                <input type="text" class="form-control" id="hospitalLicense" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="hospitalCapacity" class="form-label">Bed Capacity</label>
                                <input type="number" class="form-control" id="hospitalCapacity" min="0" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="hospitalServices" class="form-label">Services Offered</label>
                            <textarea class="form-control" id="hospitalServices" rows="2" placeholder="Emergency, Surgery, ICU, etc."></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="hospitalStatus" class="form-label">Status</label>
                                <select class="form-select" id="hospitalStatus" required>
                                    <option value="active">Active</option>
                                    <option value="inactive">Inactive</option>
                                    <option value="maintenance">Under Maintenance</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="hospitalAccreditation" class="form-label">Accreditation</label>
                                <select class="form-select" id="hospitalAccreditation">
                                    <option value="">Select Accreditation</option>
                                    <option value="JCI">JCI</option>
                                    <option value="NABH">NABH</option>
                                    <option value="ISO">ISO</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>
                        <input type="hidden" id="hospitalId">
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveHospitalBtn">Save Hospital</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/app.js"></script>
    <script src="hospital-connected.js"></script>

    <!-- tiny extra style for the empty state button -->

</body>
</html>
