<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Management | PharmaChain</title>
    <!-- Bootstrap 5 for responsive design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="patient.css">

</head>
<body>
    <div class="container">
        <h1 class="fw-bold mb-4"><i class="fas fa-users me-2 text-info"></i>Patient Management</h1>

        <!-- Stats Cards -->
        <div class="row g-4 mb-5">
            <div class="col-md-3">
                <div class="card dashboard-card border-info">
                    <div class="card-body text-center">
                        <div class="card-icon text-info">
                            <i class="fas fa-users fa-2x"></i>
                        </div>
                        <h3 id="totalPatients">0</h3>
                        <p class="card-text">Total Patients</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card dashboard-card border-success">
                    <div class="card-body text-center">
                        <div class="card-icon text-success">
                            <i class="fas fa-check-circle fa-2x"></i>
                        </div>
                        <h3 id="activePatients">0</h3>
                        <p class="card-text">Active Today</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card dashboard-card border-warning">
                    <div class="card-body text-center">
                        <div class="card-icon text-warning">
                            <i class="fas fa-clock fa-2x"></i>
                        </div>
                        <h3 id="pendingAppointments">0</h3>
                        <p class="card-text">Pending Appointments</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card dashboard-card border-primary">
                    <div class="card-body text-center">
                        <div class="card-icon text-primary">
                            <i class="fas fa-user-plus fa-2x"></i>
                        </div>
                        <h3 id="newPatients">0</h3>
                        <p class="card-text">New This Week</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Patient Button (manual) -->
        <div class="d-flex justify-content-end mb-3">
            <button class="btn btn-info" id="addPatientBtn" data-bs-toggle="modal" data-bs-target="#addPatientModal">
                <i class="fas fa-plus me-2"></i>Add Patient Manually
            </button>
        </div>

        <!-- Patient Records Table (Combined) -->
        <div class="card">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0"><i class="fas fa-list me-2"></i>Patient Records (Manual + Accepted Appointments)</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Patient ID</th>
                                <th>Name</th>
                                <th>Age</th>
                                <th>Gender</th>
                                <th>Contact</th>
                                <th>Email</th>
                                <th>Last Visit / Appointment</th>
                                <th>Status</th>
                                <th>Doctor</th>
                                <th>Source</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="patientsTableBody">
                            <!-- Patients will be added by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Patient Modal (unchanged) -->
    <div class="modal fade" id="addPatientModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title" id="patientModalTitle">Add New Patient</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addPatientForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="patientName" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="patientName" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="patientAge" class="form-label">Age</label>
                                <input type="number" class="form-control" id="patientAge" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="patientGender" class="form-label">Gender</label>
                                <select class="form-select" id="patientGender" required>
                                    <option value="">Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="patientBloodGroup" class="form-label">Blood Group</label>
                                <select class="form-select" id="patientBloodGroup">
                                    <option value="">Select Blood Group</option>
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="B+">B+</option>
                                    <option value="B-">B-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                    <option value="AB+">AB+</option>
                                    <option value="AB-">AB-</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="patientEmail" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="patientEmail">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="patientPhone" class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" id="patientPhone" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="patientAddress" class="form-label">Address</label>
                            <textarea class="form-control" id="patientAddress" rows="2"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="patientStatus" class="form-label">Status</label>
                            <select class="form-select" id="patientStatus" required>
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                                <option value="Transferred">Transferred</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="patientMedicalHistory" class="form-label">Medical History</label>
                            <textarea class="form-control" id="patientMedicalHistory" rows="3" placeholder="Any pre-existing conditions, allergies, etc."></textarea>
                        </div>
                        <input type="hidden" id="patientId">
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-info" id="savePatientBtn">Save Patient</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Container -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/app.js"></script>
    <script src="patient-connected.js"></script>

    </body>
</html>
